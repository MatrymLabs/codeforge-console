# The whole full-stack demo in one command:
#
#   git clone https://github.com/MatrymLabs/codeforge         # sibling of this repo
#   git clone https://github.com/MatrymLabs/codeforge-console
#   cd codeforge-console && docker compose up --build
#   open http://localhost:3000
#
# `api` is CodeForge's FastAPI surface (real self-audit evidence + typed contracts);
# `web` is this React/TypeScript console, server-rendering from the api over the compose
# network. Requires the codeforge repo checked out as a sibling directory.
services:
  api:
    build:
      context: ../codeforge
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      args:
        # The server component fetches this at request time; `api` is the service name
        # on the compose network (reachable from the web container, not the browser).
        NEXT_PUBLIC_API_BASE: http://api:8000
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
